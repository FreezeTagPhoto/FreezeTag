stages:
  - check-formatting
  - lint
  - test

variables:
  BACK_DIR: $CI_PROJECT_DIR/backend
  FRONT_DIR: $CI_PROJECT_DIR/frontend

# ------------ Frontend Jobs ------------ #

.pnpm_cache: &pnpm_cache
  key:
    files:
      - $FRONT_DIR/pnpm-lock.yaml
  paths:
    - $FRONT_DIR/$PNPM_STORE

format-frontend:
  stage: check-formatting
  image: node:latest
  variables:
    PNPM_STORE: $FRONT_DIR/.pnpm-store
  before_script:
    - cd $FRONT_DIR
    - npm install --global pnpm@latest-10
    - mkdir -p $PNPM_STORE
    - pnpm config set store-dir $PNPM_STORE
  script:
    - pnpm install
    - pnpm format:check
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event' && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == $CI_DEFAULT_BRANCH

lint-frontend:
  stage: lint
  image: node:latest
  variables:
    PNPM_STORE: $FRONT_DIR/.pnpm-store
  before_script:
    - cd $FRONT_DIR
    - npm install --global pnpm@latest-10
    - mkdir -p $PNPM_STORE
    - pnpm config set store-dir $PNPM_STORE
  script:
    - pnpm install
    - pnpm lint --format=@gitlab-formatters/gitlab --output-file gl-codequality.json
  cache:
    - <<: *pnpm_cache
  artifacts:
    reports:
      codequality: $FRONT_DIR/gl-codequality.json
    expire_in: 2 days
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event' && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == $CI_DEFAULT_BRANCH
      changes:
        compare_to: 'refs/heads/main'
        paths:
          - frontend/**/*

test-frontend:
  stage: test
  image: node:latest
  variables:
    PNPM_STORE: $FRONT_DIR/.pnpm-store
  before_script:
    - cd $FRONT_DIR
    - npm install --global pnpm@latest-10
    - mkdir -p $PNPM_STORE
    - pnpm config set store-dir $PNPM_STORE
  script:
    - pnpm install
    - pnpm test
    - cp coverage/cobertura-coverage.xml $CI_PROJECT_DIR/frontend-coverage.xml
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  cache:
    - <<: *pnpm_cache
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: frontend-coverage.xml
    expire_in: 2 days
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event' && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == $CI_DEFAULT_BRANCH
      changes:
        compare_to: 'refs/heads/main'
        paths:
          - frontend/**/*

# ------------ Backend Jobs ------------ #

.golang_cache: &golang_cache
  key:
    files:
      - $BACK_DIR/go.mod
      - $BACK_DIR/go.sum
  paths:
    - $BACK_DIR/.go/pkg/mod

.alpine_cache: &alpine_cache
  key:
    files:
      - $ALPINE_REQS
  paths:
    - $ALPINE_CACHE

format-backend:
  stage: check-formatting
  image: golang:latest
  variables:
    GOPATH: $BACK_DIR/.go
  cache:
    - <<: *golang_cache
  before_script:
    - cd $BACK_DIR
    - go mod tidy
  script:
    - if gofmt -l $(find . -type f -name '*.go' -not -path "./.go/*"); then
    -   echo "All Go files are correctly formatted."
    - else
    -   echo "Some files are not formatted correctly."
    -   echo "diffs:"
    -   gofmt -d .
    -   exit 1
    - fi
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event' && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == $CI_DEFAULT_BRANCH
      changes:
        compare_to: 'refs/heads/main'
        paths:
          - backend/**/*

test-backend:
  stage: test
  image: alpine:latest
  variables:
    ALPINE_REQS: $BACK_DIR/.apk-requirements
    APK_CACHE_DIR: $BACK_DIR/.apk-cache
    GOPATH: $BACK_DIR/.go
  before_script:
    - cd $BACK_DIR
    - mkdir -p $APK_CACHE_DIR
    - apk update --cache-dir $APK_CACHE_DIR
    - xargs -t -a $ALPINE_REQS apk add --cache-dir $APK_CACHE_DIR
    - export PATH="$GOPATH/bin:$PATH"
    - go mod tidy
    - go install github.com/boumenot/gocover-cobertura
  script:
    - chmod +x test.sh
    - ./test.sh
    - cp coverage.xml $CI_PROJECT_DIR/backend-coverage.xml
  coverage: '/coverage: \d+.\d+% of statements/'
  cache:
    - <<: *golang_cache
    - <<: *alpine_cache
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: backend-coverage.xml
    expire_in: 2 days
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event' && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == $CI_DEFAULT_BRANCH
      changes:
        compare_to: 'refs/heads/main'
        paths:
          - backend/**/*
